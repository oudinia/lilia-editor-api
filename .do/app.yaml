name: lilia-editor
region: fra

databases:
  - name: db
    engine: PG
    cluster_name: lilia-db-cluster
    production: true

services:
  - name: api
    dockerfile_path: Dockerfile
    github:
      repo: oudinia/lilia-editor-api
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: professional-xs
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
    routes:
      - path: /api
        preserve_path_prefix: true
      - path: /hubs
        preserve_path_prefix: true
      - path: /health
        preserve_path_prefix: true
      - path: /uploads
        preserve_path_prefix: true
    envs:
      - key: ASPNETCORE_ENVIRONMENT
        value: "Production"
      - key: ConnectionStrings__LiliaCore
        value: "Host=${db.HOSTNAME};Port=${db.PORT};Database=${db.DATABASE};Username=${db.USERNAME};Password=${db.PASSWORD};SSL Mode=Require;Trust Server Certificate=true"
      - key: Clerk__Authority
        value: "https://national-bunny-74.clerk.accounts.dev"
      - key: Clerk__Issuer
        value: "https://national-bunny-74.clerk.accounts.dev"
      - key: Clerk__SecretKey
        type: SECRET
        value: "REPLACE"
      - key: R2__Endpoint
        value: "https://fra1.digitaloceanspaces.com"
      - key: R2__AccessKeyId
        type: SECRET
        value: "REPLACE"
      - key: R2__SecretAccessKey
        type: SECRET
        value: "REPLACE"
      - key: R2__BucketName
        value: "lilia-docs"
      - key: R2__PublicUrl
        value: "https://lilia-docs.fra1.cdn.digitaloceanspaces.com"
      - key: Cors__AllowedOrigins__0
        value: "${APP_URL}"
      - key: Cors__AllowedOrigins__1
        value: "https://editor.liliaeditor.com"
      - key: Cors__AllowedOrigins__2
        value: "https://liliaeditor.com"
      - key: Cors__AllowedOrigins__3
        value: "https://www.liliaeditor.com"
      - key: BetterStack__SourceToken
        type: SECRET
        value: "REPLACE"
      - key: MinerU__BaseUrl
        value: "http://mineru:8000"
      - key: LaTeX__BaseUrl
        value: "http://latex:8001"
      - key: MinerU__TimeoutSeconds
        value: "300"
      - key: MinerU__MaxFileSizeMb
        value: "50"
      - key: AI__Anthropic__ApiKey
        type: SECRET
        value: "REPLACE"
      - key: AI__DefaultModel
        value: "claude-haiku-4-5-20251001"
      - key: AiSettings__RateLimitPerHour
        value: "100"

  - name: mineru
    dockerfile_path: docker/mineru/Dockerfile
    github:
      repo: oudinia/lilia-editor-api
      branch: main
      deploy_on_push: true
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-s
    health_check:
      http_path: /docs
      initial_delay_seconds: 120
      period_seconds: 30
      timeout_seconds: 10

  - name: latex
    dockerfile_path: docker/latex/Dockerfile
    github:
      repo: oudinia/lilia-editor-api
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: professional-xs
    internal_ports:
      - 8001
    health_check:
      http_path: /health
      port: 8001
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 5

static_sites:
  - name: editor
    build_command: "npm install --legacy-peer-deps && npm run build"
    output_dir: dist
    github:
      repo: oudinia/lilia-web-editor
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    routes:
      - path: /
    catchall_document: index.html
    envs:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        scope: BUILD_TIME
        value: "REPLACE"
      - key: VITE_EDITOR_API_URL
        scope: BUILD_TIME
        value: "${api.PUBLIC_URL}"
