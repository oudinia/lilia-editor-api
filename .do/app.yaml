name: lilia-editor
region: fra

domains:
  - domain: editor.liliaeditor.com
    type: PRIMARY

databases:
  - name: db
    engine: PG
    cluster_name: lilia-db-cluster
    production: true

services:
  - name: api
    # Pre-built in GHA (.github/workflows/api-build-deploy.yml), pushed
    # to DOCR as :main on every push. The workflow then calls
    # `doctl apps create-deployment` which makes DO pull this tag and
    # roll. No `github:` block here — DO doesn't watch the source repo
    # for this service anymore; the workflow is the single trigger so
    # we don't race against DO's own kaniko build.
    image:
      registry_type: DOCR
      repository: lilia-api
      tag: main
    http_port: 8080
    instance_count: 1
    instance_size_slug: professional-s
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
    routes:
      - path: /api
        preserve_path_prefix: true
      - path: /hubs
        preserve_path_prefix: true
      - path: /health
        preserve_path_prefix: true
      - path: /uploads
        preserve_path_prefix: true
    envs:
      - key: ASPNETCORE_ENVIRONMENT
        value: "Production"
      - key: ConnectionStrings__LiliaCore
        value: "Host=${db.HOSTNAME};Port=${db.PORT};Database=${db.DATABASE};Username=${db.USERNAME};Password=${db.PASSWORD};SSL Mode=Require;Trust Server Certificate=true"
      - key: Auth__Authority
        value: "https://liliaeditor.kinde.com"
      - key: Auth__Issuer
        value: "https://liliaeditor.kinde.com"
      - key: Auth__Audience
        value: ""
      - key: Auth__M2M__Enabled
        value: "true"
      - key: Auth__M2M__ServiceUserId
        value: "svc_e2e_test"
      - key: Auth__M2M__ServiceUserEmail
        value: "e2e@liliaeditor.com"
      - key: Auth__M2M__ServiceUserName
        value: "E2E Test Service"
      - key: R2__Endpoint
        value: "https://fra1.digitaloceanspaces.com"
      # SECRET-typed env vars: never include `value:` here. DO preserves
      # the existing stored value when the field is omitted; setting it
      # to "REPLACE" (or any literal) overwrites the real secret on
      # `doctl apps update --spec`. Burned us 2026-04-11 (Sentry DSN
      # cleared) and 2026-05-16 (Sentry + R2 + AI keys all overwritten,
      # see deploy 0a84953b ERROR). Set the real values via the DO
      # dashboard or `doctl apps update --spec` with the value field
      # included only when intentionally rotating.
      - key: R2__AccessKeyId
        type: SECRET
      - key: R2__SecretAccessKey
        type: SECRET
      - key: R2__BucketName
        value: "lilia-docs"
      - key: R2__PublicUrl
        value: "https://lilia-docs.fra1.cdn.digitaloceanspaces.com"
      - key: Cors__AllowedOrigins__0
        value: "${APP_URL}"
      - key: Cors__AllowedOrigins__1
        value: "https://editor.liliaeditor.com"
      - key: Cors__AllowedOrigins__2
        value: "https://liliaeditor.com"
      - key: Cors__AllowedOrigins__3
        value: "https://www.liliaeditor.com"
      - key: BetterStack__SourceToken
        type: SECRET
      - key: MinerU__BaseUrl
        value: "http://mineru:8000"
      # LaTeX runs in-process, no separate URL needed
      - key: MinerU__TimeoutSeconds
        value: "300"
      - key: MinerU__MaxFileSizeMb
        value: "50"
      - key: AI__Anthropic__ApiKey
        type: SECRET
      - key: AI__DefaultModel
        value: "claude-haiku-4-5-20251001"
      - key: AiSettings__RateLimitPerHour
        value: "100"
      - key: Sentry__Dsn
        type: SECRET

  # LaTeX rendering runs inside the API container (no separate service)

static_sites:
  - name: editor
    build_command: "npm install --legacy-peer-deps && npm run build"
    output_dir: dist
    github:
      repo: oudinia/lilia-web-editor
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    routes:
      - path: /
    catchall_document: index.html
    envs:
      - key: VITE_KINDE_CLIENT_ID
        scope: BUILD_TIME
        value: "c9f65cb391944c228bab270a7a019247"
      - key: VITE_KINDE_DOMAIN
        scope: BUILD_TIME
        value: "https://liliaeditor.kinde.com"
      - key: VITE_KINDE_REDIRECT_URL
        scope: BUILD_TIME
        value: "https://editor.liliaeditor.com/callback"
      - key: VITE_KINDE_LOGOUT_URL
        scope: BUILD_TIME
        value: "https://editor.liliaeditor.com"
      - key: VITE_EDITOR_API_URL
        scope: BUILD_TIME
        value: "${api.PUBLIC_URL}"
      - key: VITE_SENTRY_DSN
        scope: BUILD_TIME
        value: "REPLACE"
      - key: SENTRY_AUTH_TOKEN
        scope: BUILD_TIME
        type: SECRET
      - key: SENTRY_ORG
        scope: BUILD_TIME
        value: "lilia"
      - key: SENTRY_PROJECT
        scope: BUILD_TIME
        value: "lilia-editor"
