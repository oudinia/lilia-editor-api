name: lilia-editor
region: fra

domains:
  - domain: editor.liliaeditor.com
    type: PRIMARY

databases:
  - name: db
    engine: PG
    cluster_name: lilia-db-cluster
    production: true

services:
  - name: api
    dockerfile_path: Dockerfile
    github:
      repo: oudinia/lilia-editor-api
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: professional-xs
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
    routes:
      - path: /api
        preserve_path_prefix: true
      - path: /hubs
        preserve_path_prefix: true
      - path: /health
        preserve_path_prefix: true
      - path: /uploads
        preserve_path_prefix: true
    envs:
      - key: ASPNETCORE_ENVIRONMENT
        value: "Production"
      - key: ConnectionStrings__LiliaCore
        value: "Host=${db.HOSTNAME};Port=${db.PORT};Database=${db.DATABASE};Username=${db.USERNAME};Password=${db.PASSWORD};SSL Mode=Require;Trust Server Certificate=true"
      - key: Auth__Authority
        value: "https://liliaeditor.kinde.com"
      - key: Auth__Issuer
        value: "https://liliaeditor.kinde.com"
      - key: Auth__Audience
        value: ""
      - key: R2__Endpoint
        value: "https://fra1.digitaloceanspaces.com"
      - key: R2__AccessKeyId
        type: SECRET
        value: "REPLACE"
      - key: R2__SecretAccessKey
        type: SECRET
        value: "REPLACE"
      - key: R2__BucketName
        value: "lilia-docs"
      - key: R2__PublicUrl
        value: "https://lilia-docs.fra1.cdn.digitaloceanspaces.com"
      - key: Cors__AllowedOrigins__0
        value: "${APP_URL}"
      - key: Cors__AllowedOrigins__1
        value: "https://editor.liliaeditor.com"
      - key: Cors__AllowedOrigins__2
        value: "https://liliaeditor.com"
      - key: Cors__AllowedOrigins__3
        value: "https://www.liliaeditor.com"
      - key: BetterStack__SourceToken
        type: SECRET
        value: "REPLACE"
      - key: MinerU__BaseUrl
        value: "http://mineru:8000"
      - key: LaTeX__BaseUrl
        value: "http://latex:8001"
      - key: MinerU__TimeoutSeconds
        value: "300"
      - key: MinerU__MaxFileSizeMb
        value: "50"
      - key: AI__Anthropic__ApiKey
        type: SECRET
        value: "REPLACE"
      - key: AI__DefaultModel
        value: "claude-haiku-4-5-20251001"
      - key: AiSettings__RateLimitPerHour
        value: "100"

  # mineru and latex disabled temporarily — mineru base image too large for DO build
  # TODO: pre-build mineru image in DOCR, add latex service back

static_sites:
  - name: editor
    build_command: "npm install --legacy-peer-deps && npm run build"
    output_dir: dist
    github:
      repo: oudinia/lilia-web-editor
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    routes:
      - path: /
    catchall_document: index.html
    envs:
      - key: VITE_KINDE_CLIENT_ID
        scope: BUILD_TIME
        value: "c9f65cb391944c228bab270a7a019247"
      - key: VITE_KINDE_DOMAIN
        scope: BUILD_TIME
        value: "https://liliaeditor.kinde.com"
      - key: VITE_KINDE_REDIRECT_URL
        scope: BUILD_TIME
        value: "https://editor.liliaeditor.com/callback"
      - key: VITE_KINDE_LOGOUT_URL
        scope: BUILD_TIME
        value: "https://editor.liliaeditor.com"
      - key: VITE_EDITOR_API_URL
        scope: BUILD_TIME
        value: "${api.PUBLIC_URL}"
