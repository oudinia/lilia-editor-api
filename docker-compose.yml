services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__LiliaCore=Host=host.docker.internal;Database=lilia;Username=postgres;Password=postgres
      - MinerU__BaseUrl=http://mineru:8000
    depends_on:
      mineru:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mineru:
    build:
      context: docker/mineru
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
