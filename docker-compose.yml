services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__LiliaCore=Host=host.docker.internal;Database=lilia;Username=postgres;Password=postgres
      - MinerU__BaseUrl=http://mineru:8000
      - MinerU__Backend=pipeline
    depends_on:
      mineru:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["cpu"]

  api-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__LiliaCore=Host=host.docker.internal;Database=lilia;Username=postgres;Password=postgres
      - MinerU__BaseUrl=http://mineru-gpu:8000
      - MinerU__Backend=hybrid-auto-engine
      - MinerU__BatchPageSize=0
    depends_on:
      mineru-gpu:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["gpu"]

  # Mailpit — SMTP catcher with a web UI + HTTP API. Used in dev to
  # inspect outbound mail without hitting Resend, and as the inbox
  # endpoint for automated signup/login e2e tests.
  #
  #   SMTP:    localhost:1025  (no auth, no TLS — local only)
  #   Web UI:  http://localhost:8025
  #   API:     http://localhost:8025/api/v1/...
  #
  # Pair with `Email__Transport=smtp` and `Email__SmtpHost=localhost`
  # in appsettings.Development.json (already wired).
  mailpit:
    image: axllent/mailpit:latest
    container_name: lilia-mailpit
    # Bind both ports to 127.0.0.1 only. SMTP accepts any auth (relay
    # risk if exposed) and the HTTP UI shows every captured email, so
    # neither belongs on a public interface. Reach the web UI via SSH
    # port-forward: `ssh -L 8025:127.0.0.1:8025 <host>`.
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # HTTP + Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped
    profiles: ["dev", "cpu", "mail"]

  # CPU-only MinerU (pipeline backend, no GPU required)
  mineru:
    build:
      context: docker/mineru
      dockerfile: Dockerfile.cpu
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    profiles: ["cpu"]

  # GPU MinerU (VLM/hybrid backend, requires NVIDIA GPU with 10GB+ VRAM)
  # Usage: docker compose --profile gpu up
  mineru-gpu:
    build:
      context: docker/mineru
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    shm_size: "32g"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    profiles: ["gpu"]
